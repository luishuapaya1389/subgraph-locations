name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Get latest tag
      id: latest_tag
      uses: jacobtomlinson/gha-get-docker-hub-tags@0.1.1
      with:
        org: 'luishuapaya'  # Docker Hub user or organisation name
        repo: 'subgraph-locations'  # Docker Hub repository name

    # Optionally check the tag we got back
    - name: Check outputs
      run: |
        echo "Latest Image Tag - ${{ steps.latest_tag.outputs.tag }}"

    - name: Extract version from git tag (if applicable)
      id: extract_version
      run: |
        GIT_TAG=$(git describe --tags --abbrev=0 --exact-match 2>/dev/null || true)
        if [ -n "$GIT_TAG" ]; then
          echo "VERSION=${GIT_TAG#v}" >> $GITHUB_ENV
          echo "IS_TAG=true" >> $GITHUB_ENV
        else
          COMMIT_SHA=$(git rev-parse --short "$GITHUB_SHA")
          echo "VERSION=1.0.0-$COMMIT_SHA" >> $GITHUB_ENV
          echo "IS_TAG=false" >> $GITHUB_ENV
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        tags:
          luishuapaya/subgraph-locations:${{ env.VERSION }}
        build-args: |
          VERSION=${{ env.VERSION }}